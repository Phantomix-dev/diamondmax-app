<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-to-Canvas | Phantomix</title>
    <style>
        :root {
            --bg-main: #0B1221;
            --card-bg: #151E32;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-blue: #3B82F6;
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 650px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
        h1 { font-size: 1.6em; margin-top: 0; margin-bottom: 8px; font-weight: 700; }
        p { color: var(--text-muted); font-size: 0.95em; margin-bottom: 20px; }
        
        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.2); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; font-family: monospace; resize: none; box-sizing: border-box; margin-bottom: 20px; }
        textarea:focus { outline: none; border-color: var(--accent-blue); }
        
        #canvas-preview { background: linear-gradient(135deg, #1e3a8a, #312e81); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: left; box-sizing: border-box; margin-bottom: 20px; overflow: hidden; }
        #code-window { background: #0F172A; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 20px; color: #E2E8F0; font-family: 'Courier New', monospace; font-size: 1em; white-space: pre-wrap; word-wrap: break-word; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .dots { display: flex; gap: 8px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; } .dot-yellow { background: #ffbd2e; } .dot-green { background: #27c93f; }
        
        button { background: var(--accent-blue); color: #fff; padding: 14px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1em; width: 100%; transition: 0.2s; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Code-to-Canvas</h1>
        <p>Generate high-end aesthetic images of your source code.</p>

        <textarea id="code-input" placeholder="Paste your code snippet here..." oninput="updateSnippet()"></textarea>

        <div id="canvas-preview">
            <div id="code-window">
                <div class="dots"><div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div></div>
                <code id="code-output">// Your code snapshot will render here...</code>
            </div>
        </div>

        <button onclick="exportToImage()">Download Snippet Image</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function updateSnippet() {
            const rawCode = document.getElementById('code-input').value;
            document.getElementById('code-output').innerText = rawCode.trim() === "" ? "// Your code snapshot will render here..." : rawCode;
        }
        function exportToImage() {
            html2canvas(document.getElementById('canvas-preview'), { backgroundColor: null, scale: 2 }).then(canvas => {
                const link = document.createElement('a'); link.download = 'phantomix_snippet.png';
                link.href = canvas.toDataURL('image/png'); link.click();
            });
        }
    </script>
</body>
</html>
