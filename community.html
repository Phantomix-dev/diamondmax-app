<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Community | Phantomix</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            margin: 0; padding: 0; padding-top: 80px;
            font-family: 'Poppins', sans-serif;
            background-color: #020617; 
            color: #ffffff;
            text-align: center; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.05) 0%, transparent 60%);
        }

        /* --- Premium Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        /* --- Navbar --- */
        .phantomix-navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; box-sizing: border-box;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(14, 165, 233, 0.3); z-index: 1000;
        }
        .nav-logo { font-size: 18px; font-weight: 700; color: white; display: flex; align-items: center; text-decoration: none; }
        .back-btn {
            background: rgba(14, 165, 233, 0.1); color: #0ea5e9;
            padding: 6px 14px; border: 1px solid #0ea5e9; border-radius: 6px;
            text-decoration: none; font-size: 13px; font-weight: 600; transition: all 0.3s ease;
        }
        .back-btn:hover { background: #0ea5e9; color: #020617; box-shadow: 0 0 15px rgba(14, 165, 233, 0.6); }

        /* --- Community Chat Container --- */
        .chat-wrapper {
            max-width: 800px; margin: 20px auto 40px; padding: 0 20px;
        }
        .chat-header {
            margin-bottom: 20px;
        }
        .chat-header h1 {
            color: #0ea5e9; font-size: 32px; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }
        .chat-header p { color: #94a3b8; font-size: 14px; margin: 0; }

        .chat-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column;
            height: 60vh; min-height: 400px;
        }

        #chat-messages {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            padding-right: 10px; margin-bottom: 20px; text-align: left;
        }

        .msg-bubble {
            background: rgba(30, 41, 59, 0.6); padding: 12px 18px; 
            border-radius: 12px; border-left: 3px solid #0ea5e9; 
            font-size: 14px; line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-sender { color: #0ea5e9; font-weight: 700; font-family: 'Courier Prime', monospace; margin-right: 8px; }
        .msg-time { color: #64748b; font-size: 11px; }
        .msg-text { color: #e2e8f0; display: block; margin-top: 5px; word-wrap: break-word; }

        /* --- Input Area --- */
        .input-group {
            display: flex; gap: 10px;
        }
        .sender-input {
            width: 120px; padding: 12px; border-radius: 8px;
            border: 1px solid #334155; background: #020617; color: #0ea5e9;
            font-size: 14px; font-family: 'Courier Prime', monospace;
            outline: none; transition: all 0.3s;
        }
        .msg-input {
            flex: 1; padding: 12px 15px; border-radius: 8px;
            border: 1px solid #334155; background: #020617; color: white;
            font-size: 14px; font-family: 'Poppins', sans-serif;
            outline: none; transition: all 0.3s;
        }
        .sender-input:focus, .msg-input:focus { border-color: #0ea5e9; box-shadow: 0 0 10px rgba(14, 165, 233, 0.2); }
        
        .send-btn {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white;
            border: none; padding: 0 20px; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 16px;
        }
        .send-btn:hover { box-shadow: 0 0 15px rgba(14, 165, 233, 0.5); transform: translateY(-2px); }

        @media (max-width: 600px) {
            .input-group { flex-wrap: wrap; }
            .sender-input { width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="phantomix-navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-users" style="color: #0ea5e9; margin-right: 8px;"></i>
            Community
        </a>
        <a href="index.html" class="back-btn"><i class="fas fa-home"></i> Home</a>
    </nav>

    <div class="chat-wrapper">
        <div class="chat-header">
            <h1>Global Node Chat</h1>
            <p>Connect with other founders, developers, and early adopters in real-time.</p>
        </div>

        <div class="chat-box">
            <div id="chat-messages">
                <div style="text-align: center; color: #64748b; font-size: 13px; margin-top: auto; margin-bottom: auto;">
                    <i class="fas fa-satellite-dish fa-spin"></i> Synchronizing with Mainframe...
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="chat-sender" class="sender-input" placeholder="Alias..." maxlength="12">
                <input type="text" id="chat-text" class="msg-input" placeholder="Transmit message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                <button class="send-btn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ APNI ASLI API KEYS YAHAN ZAROOR DALEIN
        const SUPABASE_URL = "https://pekmsttmosuzcvielala.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBla21zdHRtb3N1emN2aWVsYWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjY4NDUsImV4cCI6MjA5OTAwMjg0NX0.D0akjMO2d5sYhgbSy8IIFJT4sPHGO_Lm9r1YMWM_uUc";

        async function fetchChatMessages() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/global_chat?select=*&order=created_at.desc&limit=50`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const messages = await response.json();
                const chatBox = document.getElementById("chat-messages");
                
                messages.reverse(); // Purane messages upar, naye niche
                
                // Check if user is scrolled to bottom
                const isScrolledToBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 50;

                chatBox.innerHTML = "";
                messages.forEach(msg => {
                    const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Basic Word Filter (Security check)
                    let safeMsg = msg.message.replace(/</g, "&lt;").replace(/>/g, "&gt;"); 

                    chatBox.innerHTML += `
                        <div class="msg-bubble">
                            <span class="msg-sender">[${msg.sender.replace(/</g, "&lt;")}]</span> 
                            <span class="msg-time">${time}</span>
                            <span class="msg-text">${safeMsg}</span>
                        </div>
                    `;
                });

                // Auto-scroll to bottom only if they were already at the bottom
                if (isScrolledToBottom) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

            } catch(e) { 
                console.error("Chat sync failed", e); 
            }
        }

        async function sendChatMessage() {
            let sender = document.getElementById("chat-sender").value.trim();
            const messageInput = document.getElementById("chat-text");
            const message = messageInput.value.trim();

            if(!message) return;
            if(!sender) sender = "Anon_Node";

            messageInput.value = ""; 
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/global_chat`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ sender: sender, message: message })
                });
                
                fetchChatMessages(); 
                
                // Force scroll to bottom after sending
                setTimeout(() => {
                    const chatBox = document.getElementById("chat-messages");
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 100);

            } catch(e) { 
                alert("Transmission Failed! Check connection.");
            }
        }

        // Har 3 second mein refresh karega
        setInterval(fetchChatMessages, 3000);
        window.addEventListener('load', fetchChatMessages);
    </script>
</body>
</html>
