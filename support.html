<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Phantomix Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 🌌 NAVBAR STYLING */
        .phantomix-navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(14, 165, 233, 0.2); z-index: 1000;
        }
        .nav-logo { font-size: 18px; font-weight: 700; color: white; text-decoration: none; display: flex; align-items: center; }
        .back-btn {
            background: rgba(14, 165, 233, 0.1); color: #0ea5e9;
            padding: 6px 14px; border: 1px solid #0ea5e9; border-radius: 6px;
            text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .back-btn:hover { background: #0ea5e9; color: white; }

        /* 💳 PAYMENT CARD CONTAINER */
        .pay-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 16px;
            padding: 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            margin-top: 80px;
        }

        .pay-card h2 { color: #0ea5e9; font-size: 22px; margin-bottom: 8px; }
        .pay-card p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }

        /* 📱 QR CONTAINER WITH CENTER LOGO */
        .qr-wrapper {
            position: relative;
            display: inline-block;
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
            margin-bottom: 20px;
        }

        .qr-wrapper img {
            display: block;
            width: 220px;
            height: 220px;
            border-radius: 6px;
        }

    

        /* ⚡ UPI COPY BOX */
        .upi-box {
            background: #1e293b;
            border: 1px dashed rgba(14, 165, 233, 0.5);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .upi-text {
            font-family: monospace;
            font-size: 14px;
            color: #38bdf8;
            font-weight: bold;
        }

        .copy-btn {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .copy-btn:hover { background: #0284c7; }

        /* 🚀 DIRECT APP LAUNCH BUTTON */
        .app-launch-btn {
            display: block;
            width: 100%;
            background: linear-gradient(90deg, #0ea5e9, #10b981);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: 0.3s;
        }

        .app-launch-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav class="phantomix-navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-gem" style="color: #0ea5e9; margin-right: 8px;"></i> Phantomix
        </a>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
    </nav>

    <div class="pay-card">
        <h2>Support Phantomix</h2>
        <p>Scan using any UPI App (GPay, PhonePe, Paytm, Amazon Pay)</p>

        <div class="qr-wrapper">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=8168350829@amazonpay%26pn=Phantomix%26cu=INR" alt="Phantomix UPI QR">
            <div class="qr-center-logo">
                <i class="fa-solid fa-gem" style="color: #0ea5e9; font-size: 20px;"></i>
            </div>
        </div>

        <div class="upi-box">
            <span class="upi-text" id="upi-id">8168350829@amazonpay</span>
            <button class="copy-btn" onclick="copyUPI()"><i class="fas fa-copy"></i> Copy</button>
        </div>

        <a href="upi://pay?pa=8168350829@amazonpay&pn=Phantomix&cu=INR" class="app-launch-btn">
            <i class="fas fa-bolt" style="margin-right: 6px;"></i> Pay via UPI App
        </a>
    </div>

    <script>
        function copyUPI() {
            const upiId = document.getElementById("upi-id").innerText;
            navigator.clipboard.writeText(upiId).then(() => {
                const btn = document.querySelector(".copy-btn");
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.style.background = '#10b981';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                    btn.style.background = '#0ea5e9';
                }, 2000);
            });
        }
    </script>
</body>
</html>
